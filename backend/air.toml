root = "."
tmp_dir = "tmp"

[build]
cmd = "true"
full_bin = """
  bash -c '
    [ -f ./.env.local ] && source ./.env.local || true

    echo "Starting webserver..."
    go run main.go
  '
"""

# Reload on .go file changes and .env.local changes
include_ext = ["go"]
include_file = [".env.local"]

exclude_dir = ["tmp", "vendor", "generated"]

delay = 1000
stop_on_error = true

[log]
time = true
main_only = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
