openapi: 3.0.3
info:
  title: Where Did My Money Go API
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:
  /auth/me:
    get:
      summary: Check authentication status
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "204":
          description: Logged in
          headers:
            Set-Cookie:
              schema:
                type: string
        "409":
          description: Email already exists
  /auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: 
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "204":
          description: Logged in
          headers:
            Set-Cookie:
              schema:
                type: string
  /auth/logout:
    post:
      responses:
        "204":
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
  /expenses/list:
    post:
      summary: List expenses for a date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Date"
      responses:
        "200":
          description: Expense list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpensesByCategory"
  /expenses/create:
    post:
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpense"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
  /expenses/{id}:
    put:
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpense"
      responses:
        "204":
          description: Updated expense
        "404":
          description: Expense not found
        "409":
          description: Expense has pending shares — resolve them first
    delete:
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Expense not found
  /expenses/export:
    post:
      summary: Export expenses as CSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseExportRequest"
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
  /expenses/daily-totals:
    get:
      summary: Total expenses per day for a given month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Daily totals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyTotal"
  /summary:
    get:
      summary: Category summary for a date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Summary per category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySummary"

  /friends:
    get:
      summary: List accepted friends
      responses:
        "200":
          description: List of friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Friend"

  /friends/request:
    post:
      summary: Send a friend request by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        "204":
          description: Request sent
        "404":
          description: User not found
        "409":
          description: Already friends or request already sent

  /friends/requests:
    get:
      summary: List incoming pending friend requests
      responses:
        "200":
          description: Pending incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequest"

  /friends/{id}/accept:
    post:
      summary: Accept a friend request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Accepted
        "404":
          description: Request not found

  /friends/{id}/reject:
    post:
      summary: Reject a friend request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Rejected
        "404":
          description: Request not found

  /friends/{id}:
    delete:
      summary: Remove a friend
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Removed

  /expenses/{id}/share:
    post:
      summary: Share an expense with friends (cost-split)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareExpenseRequest"
      responses:
        "204":
          description: Shared
        "400":
          description: Invalid split amounts
        "403":
          description: Not the owner of this expense
        "404":
          description: Expense not found

  /expenses/shared/pending:
    get:
      summary: List pending shared expenses addressed to current user
      responses:
        "200":
          description: Pending shares
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingShare"

  /expenses/shared/{shareId}/accept:
    post:
      summary: Accept a shared expense split
      parameters:
        - name: shareId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Accepted — new expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Share not found

  /expenses/shared/{shareId}/reject:
    post:
      summary: Reject a shared expense split
      parameters:
        - name: shareId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Rejected
        "404":
          description: Share not found

  /notifications/badge:
    get:
      summary: Count of pending friend requests + pending shared expenses
      responses:
        "200":
          description: Badge count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadgeCount"

components:
  schemas:
    Expense:
      type: object
      required: [id, category, amount, date]
      properties:
        id:
          type: string
          format: uuid
        category:
          type: string
        amount:
          type: integer
        date:
          type: string
          format: date-time
        remark:
          type: string
        pendingShareCount:
          type: integer
        sharedFromEmail:
          type: string
    CreateExpense:
      type: object
      required:
        - category
        - amount
        - date
      properties:
        category:
          type: string
        amount:
          type: integer
        date:
          $ref: "#/components/schemas/Date"
        remark:
          type: string
    UpdateExpense:
      type: object
      properties:
        amount:
          type: integer
        remark:
          type: string
    DailyTotal:
      type: object
      required: [date, total]
      properties:
        date:
          type: integer
        total:
          type: integer
    CategorySummary:
      type: object
      required: [category, total]
      properties:
        category:
          type: string
        total:
          type: integer
    ExpensesByCategory:
      type: object
      required: 
        - category
        - expenses
      properties:
        category:
          type: string
        expenses:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
    ExpenseExportRequest:
      type: object
      required: 
        - type
      properties:
        type:
          type: string
          enum: [monthly, yearly, range]
        monthOffset:
          type: integer
          description: 0 = current month, 1 = previous month
        year:
          type: integer
        from:
          type: string
          format: date
        to:
          type: string
          format: date
    Date:
      type: object
      required:
        - date
        - month
        - year
      properties:
        date:
          type: integer
        month:
          type: integer
        year:
          type: integer
    User:
      type: object
      required: 
        - id
        - email
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        createdAt:
          type: string
    Friend:
      type: object
      required: [friendshipId, id, email]
      properties:
        friendshipId:
          type: string
          format: uuid
        id:
          type: string
          format: uuid
        email:
          type: string
    FriendRequest:
      type: object
      required: [id, requesterEmail, requesterId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        requesterId:
          type: string
          format: uuid
        requesterEmail:
          type: string
        createdAt:
          type: string
          format: date-time
    ShareSplit:
      type: object
      required: [friendId, amount]
      properties:
        friendId:
          type: string
          format: uuid
        amount:
          type: integer
    ShareExpenseRequest:
      type: object
      required: [splits]
      properties:
        splits:
          type: array
          items:
            $ref: "#/components/schemas/ShareSplit"
    PendingShare:
      type: object
      required: [id, splitAmount, originalTotal, category, expenseDate, sharedByEmail, sharedById]
      properties:
        id:
          type: string
          format: uuid
        splitAmount:
          type: integer
        originalTotal:
          type: integer
        category:
          type: string
        expenseDate:
          type: string
          format: date-time
        sharedByEmail:
          type: string
        sharedById:
          type: string
          format: uuid
    BadgeCount:
      type: object
      required: [friendRequests, pendingShares]
      properties:
        friendRequests:
          type: integer
        pendingShares:
          type: integer
