volumes:
  pgdata_wdmmg:
  go_mod_cache:

services:
  wdmmg-db:
    image: postgres:17
    container_name: wdmmg-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wdmmg_user
      POSTGRES_PASSWORD: wdmmg_password
      POSTGRES_DB: wdmmg_db
    volumes:
      - pgdata_wdmmg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wdmmg_user -d wdmmg_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  wdmmg-backend:
    image: golang:1.25
    container_name: wdmmg-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://wdmmg_user:wdmmg_password@wdmmg-db:5432/wdmmg_db?sslmode=disable
      JWT_SECRET: change-me-to-a-long-random-secret
      APP_ENV: development
      GOMODCACHE: /go/pkg/mod
    depends_on:
      wdmmg-db:
        condition: service_healthy
    command: >
      sh -c "
        go tool goose -dir internal/db/migrations postgres \"$$DATABASE_URL\" up &&
        go tool sqlc generate -f internal/db/sqlc.yml &&
        go tool air
      "

  wdmmg-frontend:
    image: node:22
    container_name: wdmmg-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://wdmmg-backend:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - wdmmg-backend
